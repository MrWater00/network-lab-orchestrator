name: network-lab

mgmt:
  network: mgmt-net
  ipv4-subnet: 172.20.20.0/24

topology:
  nodes:

    # --- Core Router ---
    r1:
      kind: linux
      image: frrouting/frr:latest
      mgmt-ipv4: 172.20.20.10
      labels:
        role: router

    # --- Switches (act as Layer 2 bridges) ---
    sw1:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.11
      labels:
        role: switch

    sw2:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.12
      labels:
        role: switch

    # --- End Hosts ---
    pc1:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.21
      labels:
        role: host

    pc2:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.22
      labels:
        role: host

    pc3:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.23
      labels:
        role: host

    pc4:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.24
      labels:
        role: host

  links:
    # R1 connects to SW1
    - endpoints: ["r1:eth1", "sw1:eth1"]
    # R1 connects to SW2
    - endpoints: ["r1:eth2", "sw2:eth1"]
    # SW1 connects to PC1 and PC2
    - endpoints: ["sw1:eth2", "pc1:eth1"]
    - endpoints: ["sw1:eth3", "pc2:eth1"]
    # SW2 connects to PC3 and PC4
    - endpoints: ["sw2:eth2", "pc3:eth1"]
    - endpoints: ["sw2:eth3", "pc4:eth1"]
