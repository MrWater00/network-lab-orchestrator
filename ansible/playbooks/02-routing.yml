---
- name: Configure routing on R1
  hosts: routers
  gather_facts: false
  tasks:

    - name: Enable IP forwarding on R1
      raw: sysctl -w net.ipv4.ip_forward=1
      ignore_errors: yes

    - name: Add static routes on R1
      raw: ip route add 192.168.2.0/24 dev eth2 2>/dev/null; ip route add 192.168.1.0/24 dev eth1 2>/dev/null
      ignore_errors: yes

- name: Configure default gateways on hosts
  hosts: hosts_group
  gather_facts: false
  tasks:

    - name: Set default gateway for PC1 and PC2
      raw: ip route add default via 192.168.1.1 2>/dev/null
      when: inventory_hostname in ['clab-network-lab-pc1', 'clab-network-lab-pc2']
      ignore_errors: yes

    - name: Set default gateway for PC3 and PC4
      raw: ip route add default via 192.168.2.1 2>/dev/null
      when: inventory_hostname in ['clab-network-lab-pc3', 'clab-network-lab-pc4']
      ignore_errors: yes
